# Optimized workflow for deploying React portfolio to GitHub Pages
name: Deploy Portfolio to GitHub Pages

on:
  # Runs on pushes targeting the development branch (build only)
  push:
    branches: ["development"]
  
  # Runs on pull requests to development (build only)
  pull_request:
    branches: ["development"]
  
  # Runs when PR is merged to main (deploy to production)
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job (runs on development pushes and PRs)
  build:
    runs-on: ubuntu-latest
    # Only run on development branch events, not on main
    if: github.ref == 'refs/heads/development' || github.event_name == 'pull_request'
    outputs:
      build-success: ${{ steps.build-status.outputs.success }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Clean install dependencies
        run: |
          yarn install --frozen-lockfile --prefer-offline

      - name: Clean previous builds
        run: |
          rm -rf build/
          rm -rf public/styles/output.css
          rm -rf node_modules/.cache

      - name: Pre-deployment verification
        run: |
          node scripts/pre-deploy.js

      - name: Generate Tailwind CSS
        run: |
          yarn tailwindcss -i ./src/index.css -o ./public/styles/output.css --minify

      - name: Build React app
        run: |
          yarn build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Verify build output
        run: |
          ls -la build/
          echo "Build completed successfully"

      - name: Set build status
        id: build-status
        run: |
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Upload build artifacts (Development)
        if: github.ref == 'refs/heads/development'
        uses: actions/upload-artifact@v4
        with:
          name: build-files-dev
          path: build/
          retention-days: 7

      - name: Upload build artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-files-pr-${{ github.event.number }}
          path: build/
          retention-days: 3

      - name: Build status (Development)
        if: github.ref == 'refs/heads/development'
        run: |
          echo "✅ Development build completed successfully!"
          echo "📦 Artifacts uploaded for future deployment"

      - name: Build status (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ PR build completed successfully!"
          echo "📦 Artifacts uploaded for PR review"

  # Production build and deploy job (runs only on main branch)
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only run on main branch pushes
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Clean install dependencies
        run: |
          yarn install --frozen-lockfile --prefer-offline

      - name: Clean previous builds
        run: |
          rm -rf build/
          rm -rf public/styles/output.css
          rm -rf node_modules/.cache

      - name: Pre-deployment verification
        run: |
          node scripts/pre-deploy.js

      - name: Generate Tailwind CSS
        run: |
          yarn tailwindcss -i ./src/index.css -o ./public/styles/output.css --minify

      - name: Build React app
        run: |
          yarn build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Verify build output
        run: |
          ls -la build/
          echo "Production build completed successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Production deployment status
        run: |
          echo "🚀 Production deployment completed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Deployed at: $(date)"
