# Optimized workflow for deploying React portfolio to GitHub Pages
name: Deploy Portfolio to GitHub Pages

on:
  # Runs on pushes targeting the development branch
  push:
    branches: ["development"]
  
  # Runs on pull requests to development
  pull_request:
    branches: ["development"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build and test job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Clean install dependencies
        run: |
          yarn install --frozen-lockfile --prefer-offline

      - name: Clean previous builds
        run: |
          rm -rf build/
          rm -rf public/styles/output.css
          rm -rf node_modules/.cache

      - name: Pre-deployment verification
        run: |
          node scripts/pre-deploy.js

      - name: Generate Tailwind CSS
        run: |
          yarn tailwindcss -i ./src/index.css -o ./public/styles/output.css --minify

      - name: Build React app
        run: |
          yarn build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Verify build output
        run: |
          ls -la build/
          echo "Build completed successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1

  # Deploy job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment status
        run: |
          echo "Deployment completed successfully!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
